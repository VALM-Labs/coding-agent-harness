name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Fast-forward fork from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork main from upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo sync VALM-Labs/coding-agent-harness --branch main